name: Security — Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Block merging PRs that introduce hardcoded secrets. Runs gitleaks against
# the full diff on a PR, and against the full history on push-to-main as a
# defence-in-depth check.
#
# False-positive workflow: add a rule allowlist entry to .gitleaks.toml,
# scoped narrowly to the file/path. Do NOT add commit-SHA exceptions —
# secrets need to be rotated, not allowlisted in place.

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSLo gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Git scan commits in pull request against the base branch
            gitleaks detect --log-opts="origin/${{ github.base_ref }}..HEAD" --config=.gitleaks.toml --verbose --redact
          else
            # Git scan only the commits pushed in the push event to main (avoid historical false positives)
            gitleaks detect --log-opts="HEAD~1..HEAD" --config=.gitleaks.toml --verbose --redact
          fi
